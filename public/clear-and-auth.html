<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clearing Session...</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .container {
            text-align: center;
            padding: 2rem;
        }
        .spinner {
            border: 4px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top: 4px solid white;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 1rem;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        h1 {
            font-size: 1.5rem;
            font-weight: 600;
            margin: 0 0 0.5rem;
        }
        p {
            margin: 0;
            opacity: 0.9;
            font-size: 0.875rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="spinner"></div>
        <h1>Clearing session...</h1>
        <p>Preparing fresh authentication</p>
    </div>
    
    <script>
        (async function() {
            const urlParams = new URLSearchParams(window.location.search);
            const targetUrl = urlParams.get('target');
            
            if (!targetUrl) {
                console.error('No target URL provided');
                document.querySelector('.container').innerHTML = '<h1>Error</h1><p>No authentication URL provided</p>';
                return;
            }
            
            console.log('🧹 Clearing any existing Bullhorn session cookies...');
            
            const bullhornDomains = [
                '.bullhornstaffing.com',
                'auth-east.bullhornstaffing.com',
                'auth-west.bullhornstaffing.com',
                'auth-west9.bullhornstaffing.com',
                'welcome.bullhornstaffing.com'
            ];
            
            document.cookie.split(";").forEach(function(c) { 
                const cookieName = c.trim().split("=")[0];
                
                document.cookie = cookieName + '=;expires=Thu, 01 Jan 1970 00:00:00 GMT;path=/';
                
                bullhornDomains.forEach(domain => {
                    document.cookie = cookieName + `=;expires=Thu, 01 Jan 1970 00:00:00 GMT;path=/;domain=${domain}`;
                });
            });
            
            sessionStorage.clear();
            
            console.log('✅ Session cleared, redirecting to auth URL...');
            
            setTimeout(() => {
                window.location.href = decodeURIComponent(targetUrl);
            }, 100);
        })();
    </script>
</body>
</html>
